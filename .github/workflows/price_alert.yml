name: Price Drop Alert

on:
  schedule:
    # Runs every hour Mon–Fri from 9:30 AM to 3:30 PM IST
    # IST = UTC+5:30, so 9:30 IST = 4:00 UTC, 3:30 IST = 10:00 UTC
    - cron: "0 4-10 * * 1-5"

  # Lets you trigger it manually from the GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run price alert script
        env:
          GMAIL_SENDER:   ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          ALERT_RECEIVER: ${{ secrets.ALERT_RECEIVER }}
        run: python price_alert.py
