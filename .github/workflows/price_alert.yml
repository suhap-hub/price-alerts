name: Price Drop Alert

on:
  schedule:
    # Runs every 15 minutes Mon–Fri during IST market hours
    # IST = UTC+5:30  |  Market: 09:15–15:30 IST = 03:45–10:00 UTC
    - cron: "*/15 3-10 * * 1-5"

  # Lets you trigger it manually from the GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Run price alert script
        env:
          GMAIL_SENDER:   ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          ALERT_RECEIVER: ${{ secrets.ALERT_RECEIVER }}
        run: python price_alert.py
